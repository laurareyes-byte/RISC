<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
    <linearGradient id="tank" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#607D8B"/><stop offset="100%" stop-color="#455A64"/></linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4FC3F7"/><stop offset="100%" stop-color="#0288D1"/></linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#66BB6A"/><stop offset="100%" stop-color="#43A047"/></linearGradient>
  </defs>
  <rect width="400" height="280" rx="20" fill="url(#sky)"/>
  <!-- Ground -->
  <path d="M0 200 Q100 185 200 195 Q300 205 400 190 L400 280 L0 280 Z" fill="#8D6E63"/>
  <path d="M0 190 Q100 175 200 185 Q300 195 400 180 L400 200 Q300 205 200 195 Q100 185 0 200 Z" fill="url(#grass)"/>
  <!-- Tank underground -->
  <rect x="100" y="195" width="200" height="70" rx="8" fill="url(#tank)" opacity="0.9"/>
  <rect x="110" y="205" width="180" height="50" rx="5" fill="#37474F"/>
  <!-- Water inside tank -->
  <rect x="112" y="220" width="176" height="33" rx="3" fill="url(#water)" opacity="0.7"/>
  <!-- Lodos -->
  <rect x="112" y="240" width="176" height="13" rx="2" fill="#795548" opacity="0.6"/>
  <!-- Pipes -->
  <rect x="60" y="200" width="50" height="12" rx="4" fill="#78909C"/>
  <rect x="290" y="200" width="50" height="12" rx="4" fill="#78909C"/>
  <!-- Manhole covers -->
  <rect x="155" y="186" width="30" height="12" rx="4" fill="#90A4AE"/>
  <rect x="215" y="186" width="30" height="12" rx="4" fill="#90A4AE"/>
  <!-- Vent pipe -->
  <rect x="167" y="150" width="8" height="40" rx="2" fill="#90A4AE"/>
  <circle cx="171" cy="148" r="6" fill="#B0BEC5"/>
  <!-- Wrench icon -->
  <g transform="translate(310,80) scale(0.5)">
    <circle cx="40" cy="40" r="36" fill="#FFF" opacity="0.8"/>
    <path d="M25 55 L55 25" stroke="#1B5E20" stroke-width="6" stroke-linecap="round"/>
    <circle cx="55" cy="25" r="10" fill="none" stroke="#1B5E20" stroke-width="4"/>
    <rect x="18" y="50" width="14" height="14" rx="2" fill="#1B5E20" transform="rotate(45 25 55)"/>
  </g>
  <!-- Flowers -->
  <circle cx="70" cy="178" r="5" fill="#FFEB3B"/><circle cx="65" cy="174" r="3" fill="#FFF176"/>
  <circle cx="340" cy="172" r="5" fill="#FFEB3B"/><circle cx="335" cy="168" r="3" fill="#FFF176"/>
  <!-- Tree -->
  <rect x="42" y="140" width="6" height="45" fill="#6D4C41"/>
  <circle cx="45" cy="125" r="22" fill="#43A047" opacity="0.8"/>
  <circle cx="55" cy="135" r="16" fill="#66BB6A" opacity="0.7"/>
</svg>
