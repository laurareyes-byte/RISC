<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
    <linearGradient id="trap" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B0BEC5"/><stop offset="100%" stop-color="#78909C"/></linearGradient>
  </defs>
  <rect width="400" height="280" rx="20" fill="url(#bg1)"/>
  <!-- Floor tiles -->
  <rect x="0" y="200" width="400" height="80" fill="#ECEFF1"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#CFD8DC" stroke-width="1"/>
  <line x1="100" y1="200" x2="100" y2="280" stroke="#CFD8DC" stroke-width="1"/>
  <line x1="200" y1="200" x2="200" y2="280" stroke="#CFD8DC" stroke-width="1"/>
  <line x1="300" y1="200" x2="300" y2="280" stroke="#CFD8DC" stroke-width="1"/>
  <!-- Grease trap box -->
  <rect x="110" y="110" width="180" height="100" rx="8" fill="url(#trap)"/>
  <rect x="120" y="120" width="160" height="80" rx="5" fill="#546E7A"/>
  <!-- Grease layer (yellow) -->
  <rect x="122" y="122" width="156" height="25" rx="3" fill="#FFB300" opacity="0.7"/>
  <!-- Water -->
  <rect x="122" y="147" width="156" height="30" rx="0" fill="#4FC3F7" opacity="0.5"/>
  <!-- Sediment -->
  <rect x="122" y="177" width="156" height="21" rx="3" fill="#8D6E63" opacity="0.5"/>
  <!-- Inlet pipe -->
  <rect x="50" y="130" width="68" height="14" rx="5" fill="#90A4AE"/>
  <path d="M50 130 L50 144 L60 137 Z" fill="#4FC3F7" opacity="0.5"/>
  <!-- Outlet pipe -->
  <rect x="282" y="155" width="68" height="14" rx="5" fill="#90A4AE"/>
  <!-- Lid -->
  <rect x="140" y="104" width="120" height="12" rx="4" fill="#90A4AE"/>
  <circle cx="200" cy="110" r="5" fill="#B0BEC5"/>
  <!-- Broom/cleaning -->
  <g transform="translate(320,50) scale(0.6)">
    <circle cx="40" cy="40" r="36" fill="#FFF" opacity="0.8"/>
    <rect x="35" y="10" width="8" height="50" rx="3" fill="#6D4C41"/>
    <rect x="25" y="55" width="28" height="12" rx="3" fill="#1B5E20"/>
    <line x1="28" y1="67" x2="28" y2="72" stroke="#1B5E20" stroke-width="2"/>
    <line x1="34" y1="67" x2="34" y2="74" stroke="#1B5E20" stroke-width="2"/>
    <line x1="40" y1="67" x2="40" y2="72" stroke="#1B5E20" stroke-width="2"/>
    <line x1="46" y1="67" x2="46" y2="74" stroke="#1B5E20" stroke-width="2"/>
  </g>
  <!-- Water drops -->
  <path d="M80 160 Q82 150 84 160 Q82 165 80 160Z" fill="#4FC3F7" opacity="0.6"/>
  <path d="M340 175 Q342 165 344 175 Q342 180 340 175Z" fill="#4FC3F7" opacity="0.6"/>
  <!-- Bubbles -->
  <circle cx="155" cy="135" r="4" fill="#FFF" opacity="0.4"/>
  <circle cx="230" cy="128" r="3" fill="#FFF" opacity="0.3"/>
  <circle cx="190" cy="140" r="5" fill="#FFF" opacity="0.3"/>
</svg>
