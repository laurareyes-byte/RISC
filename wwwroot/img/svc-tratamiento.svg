  <!-- Bacteria dots -->
  <circle cx="190" cy="115" r="3" fill="#66BB6A"/>
  <circle cx="210" cy="125" r="2" fill="#66BB6A"/>
  <circle cx="220" cy="110" r="3" fill="#66BB6A"/>
  <circle cx="195" cy="130" r="2" fill="#66BB6A"/>
  <!-- Arrow 2 -->
  <path d="M250 110 L280 110" stroke="url(#g3b)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="280,105 290,110 280,115" fill="#0277BD"/>
  <!-- Tank 3 -->
  <rect x="290" y="60" width="80" height="100" rx="10" fill="#78909C"/>
