<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#B3E5FC"/></linearGradient>
    <linearGradient id="w1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EF5350"/><stop offset="100%" stop-color="#E53935"/></linearGradient>
    <linearGradient id="w2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFA726"/><stop offset="100%" stop-color="#FB8C00"/></linearGradient>
    <linearGradient id="w3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#42A5F5"/><stop offset="100%" stop-color="#1E88E5"/></linearGradient>
  </defs>
  <rect width="400" height="280" rx="20" fill="url(#bg2)"/>
  <!-- Process: 3 tanks -->
  <!-- Tank 1: dirty water -->
  <rect x="30" y="100" width="80" height="110" rx="10" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="2"/>
  <rect x="35" y="140" width="70" height="65" rx="5" fill="url(#w1)" opacity="0.5"/>
  <text x="70" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#546E7A" font-weight="600">Entrada</text>
  <!-- Arrow 1 -->
  <path d="M115 155 L155 155" stroke="#66BB6A" stroke-width="3" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8Z" fill="#66BB6A"/></marker></defs>
  <!-- Tank 2: treatment -->
  <rect x="160" y="100" width="80" height="110" rx="10" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="2"/>
  <rect x="165" y="140" width="70" height="65" rx="5" fill="url(#w2)" opacity="0.5"/>
  <text x="200" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#546E7A" font-weight="600">Tratamiento</text>
  <!-- Bacteria dots -->
  <circle cx="185" cy="160" r="3" fill="#66BB6A"/><circle cx="195" cy="170" r="2" fill="#66BB6A"/><circle cx="210" cy="155" r="3" fill="#66BB6A"/>
  <!-- Arrow 2 -->
  <path d="M245 155 L285 155" stroke="#66BB6A" stroke-width="3" marker-end="url(#arr)"/>
  <!-- Tank 3: clean water -->
  <rect x="290" y="100" width="80" height="110" rx="10" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="2"/>
  <rect x="295" y="140" width="70" height="65" rx="5" fill="url(#w3)" opacity="0.5"/>
  <text x="330" y="90" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#546E7A" font-weight="600">Salida</text>
  <!-- Plant/nature at end -->
  <g transform="translate(335,95) scale(0.5)">
    <path d="M0 20 Q15 -10 30 20" fill="#66BB6A"/>
    <path d="M5 15 Q15 -5 25 15" fill="#43A047"/>
    <rect x="13" y="18" width="4" height="15" fill="#6D4C41"/>
  </g>
  <!-- Water drop icon -->
  <g transform="translate(170,230) scale(0.7)">
    <circle cx="40" cy="35" r="30" fill="#FFF" opacity="0.7"/>
    <path d="M40 10 Q25 30 25 42 A15 15 0 0 0 55 42 Q55 30 40 10Z" fill="#0288D1"/>
    <ellipse cx="35" cy="35" rx="4" ry="6" fill="#FFF" opacity="0.4" transform="rotate(-15 35 35)"/>
  </g>
  <!-- Checkmark -->
  <g transform="translate(310,220)">
    <circle cx="20" cy="20" r="18" fill="#66BB6A"/>
    <path d="M12 20 L18 26 L28 14" stroke="#FFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
