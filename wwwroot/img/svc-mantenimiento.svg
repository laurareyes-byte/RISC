<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="g1b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="20" fill="url(#g1)"/>
  <!-- Tank body -->
  <rect x="120" y="60" width="160" height="120" rx="12" fill="#5D4037" opacity="0.8"/>
  <rect x="130" y="70" width="140" height="100" rx="8" fill="#795548"/>
  <!-- Water inside -->
  <rect x="130" y="110" width="140" height="60" rx="0 0 8 8" fill="#29B6F6" opacity="0.6"/>
  <ellipse cx="200" cy="110" rx="70" ry="6" fill="#4FC3F7" opacity="0.4"/>
  <!-- Lid -->
  <rect x="170" y="50" width="60" height="16" rx="8" fill="#455A64"/>
  <circle cx="200" cy="58" r="4" fill="#78909C"/>
  <!-- Wrench -->
  <g transform="translate(300,70) rotate(30)">
    <rect x="-4" y="0" width="8" height="55" rx="4" fill="url(#g1b)"/>
    <circle cx="0" cy="0" r="16" fill="url(#g1b)"/>
    <circle cx="0" cy="0" r="7" fill="#E8F5E9"/>
    <circle cx="0" cy="60" r="10" fill="url(#g1b)"/>
    <rect x="-10" y="56" width="20" height="8" rx="2" fill="url(#g1b)"/>
  </g>
  <!-- Checkmark -->
  <circle cx="80" cy="80" r="24" fill="#4CAF50"/>
  <path d="M68 80 L76 88 L92 72" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Pipes -->
  <rect x="90" y="120" width="40" height="10" rx="5" fill="#78909C"/>
  <rect x="270" y="120" width="40" height="10" rx="5" fill="#78909C"/>
  <!-- Bubbles -->
  <circle cx="170" cy="135" r="4" fill="white" opacity="0.5"/>
  <circle cx="210" cy="125" r="3" fill="white" opacity="0.4"/>
  <circle cx="230" cy="140" r="5" fill="white" opacity="0.3"/>
  <!-- Label area -->
  <text x="200" y="215" text-anchor="middle" font-family="Poppins,sans-serif" font-size="14" font-weight="600" fill="#1B5E20">Mantenimiento Profesional</text>
</svg>
